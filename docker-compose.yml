version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_dev
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:latest
    container_name: taskflow-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://taskflow:taskflow_dev@postgres:5432/taskflow?sslmode=disable
    volumes:
      - ./backend/migrations:/migrations
    command: up
    restart: on-failure:3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-api
    depends_on:
      migrate:
        condition: completed
    environment:
      DATABASE_URL: postgres://taskflow:taskflow_dev@postgres:5432/taskflow?sslmode=disable
      JWT_SECRET: change-me-to-a-long-random-string-in-production
      PORT: 8080
      ENVIRONMENT: development
    ports:
      - "8080:8080"
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: taskflow-frontend
    depends_on:
      - api
    ports:
      - "3000:80"
    restart: on-failure

volumes:
  postgres_data: